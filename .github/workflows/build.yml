name: Build VST3

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get JUCE 8
        shell: bash
        run: |
          git clone --depth 1 --branch 8.0.2 \
            https://github.com/juce-framework/JUCE.git \
            "${{ github.workspace }}/JUCE"

      - name: Configure CMake (VS 2022)
        run: |
          cmake -B Build -G "Visual Studio 17 2022" -A x64 ^
            -DJUCE_DIR="%CD%\JUCE" ^
            -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build Build --config Release --target SpatialReactor_VST3

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpatialReactor_VST3
          path: Build\SpatialReactor_artefacts\Release\VST3\
